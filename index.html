<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Kasatria 3D Data Table</title>
<link rel="stylesheet" href="css/style.css" />

<!-- Google Identity Services (used here only for the OAuth token client) -->
<script src="https://accounts.google.com/gsi/client" async defer></script>

<!-- Import map: lets the browser resolve bare module specifiers below -->
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/",
    "@tweenjs/tween.js": "https://cdn.jsdelivr.net/npm/@tweenjs/tween.js@23.1.1/dist/tween.esm.js"
  }
}
</script>
</head>
<body>

  <!-- ===================== LOGIN SCREEN ===================== -->
  <div id="login-screen">
    <div class="login-card">
      <h1>Kasatria Data Explorer</h1>
      <p>Sign in with Google to load the dataset</p>

      <button id="google-signin-btn" class="google-btn">
        <svg width="18" height="18" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg">
          <path fill="#4285F4" d="M17.64 9.2c0-.64-.06-1.25-.16-1.84H9v3.49h4.84c-.21 1.13-.85 2.09-1.8 2.73v2.27h2.92c1.71-1.57 2.68-3.88 2.68-6.65z"/>
          <path fill="#34A853" d="M9 18c2.43 0 4.47-.8 5.96-2.18l-2.92-2.27c-.81.54-1.84.86-3.04.86-2.34 0-4.32-1.58-5.03-3.71H.96v2.33C2.44 15.98 5.48 18 9 18z"/>
          <path fill="#FBBC05" d="M3.97 10.7c-.18-.54-.28-1.11-.28-1.7s.1-1.16.28-1.7V4.97H.96C.35 6.19 0 7.55 0 9s.35 2.81.96 4.03l3.01-2.33z"/>
          <path fill="#EA4335" d="M9 3.58c1.32 0 2.51.45 3.44 1.35l2.59-2.59C13.46.89 11.43 0 9 0 5.48 0 2.44 2.02.96 4.97l3.01 2.33C4.68 5.16 6.66 3.58 9 3.58z"/>
        </svg>
        <span>Sign in with Google</span>
      </button>

    </div>
  </div>

  <!-- ===================== MAIN APP ===================== -->
  <div id="app" style="display:none;">
    <div id="container"></div>

    <div id="menu">
      <button id="table">TABLE</button>
      <button id="sphere">SPHERE</button>
      <button id="helix">HELIX</button>
      <button id="grid">GRID</button>
    </div>

    <div id="legend">
      <span class="legend-label">LOW</span>
      <div class="legend-bar"></div>
      <span class="legend-label">HIGH</span>
      <span class="legend-caption">Net Worth</span>
    </div>

    <div id="loading-indicator" style="display:none;">Loading data…</div>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
